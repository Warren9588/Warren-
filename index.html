<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>趣味数学大冒险 — 四年级下册</title>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- SPA 挂载点 -->
  <div id="app">
    <!-- 导航栏（各页面共用） -->
    <nav id="navbar" class="navbar" style="display:none;">
      <div class="navbar-left">
        <button id="nav-back" class="navbar-back" title="返回">←</button>
        <span id="nav-title" class="navbar-title"></span>
      </div>
      <div class="navbar-right">
        <span id="nav-sync" class="nav-sync" title="云同步状态">🔌</span>
        <span id="nav-student" style="margin-right:8px;"></span>
        <span id="nav-coins" class="coin-display">🪙 <span>0</span></span>
      </div>
    </nav>

    <!-- 各页面容器 -->
    <section id="page-cover" class="page page-centered"></section>
    <section id="page-teacher" class="page"></section>
    <section id="page-map" class="page"></section>
    <section id="page-story" class="page page-centered"></section>
    <section id="page-quiz" class="page"></section>
    <section id="page-reward" class="page page-centered"></section>
    <section id="page-wrongcamp" class="page"></section>
    <section id="page-advanced" class="page"></section>
    <section id="page-report" class="page"></section>
    <section id="page-report-adv" class="page"></section>

    <!-- 通用模态弹窗 -->
    <div id="modal-overlay" class="modal-overlay" style="display:none;">
      <div id="modal-box" class="modal-box"></div>
    </div>
  </div>

  <!-- Supabase 客户端 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- JS 模块（按依赖顺序加载） -->
  <script src="data/all-data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/generator.js"></script>
  <!-- 模板在 generator.js 之后加载，自动注册 -->
  <script src="data/templates/unit1.js"></script>
  <script src="data/templates/unit2.js"></script>
  <script src="data/templates/unit3.js"></script>
  <script src="data/templates/unit4.js"></script>
  <script src="data/templates/unit5.js"></script>
  <script src="data/templates/unit6.js"></script>
  <script src="js/db.js"></script>
  <script src="js/story.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/reward.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
